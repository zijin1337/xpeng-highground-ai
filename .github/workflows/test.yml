name: test

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  decision-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run deterministic safety tests
        run: npm test
