name: test

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  decision-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run deterministic safety tests
        run: npm test

  backend-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run API, database, authorization and decision tests
        run: python -m pytest backend/tests -q

  p5-headunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android 33 SDK
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test, build and lint the P5 app
        working-directory: p5-headunit
        run: bash ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:lintDebug --no-daemon
      - name: Upload unsigned P5 debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: highground-p5-debug-apk
          path: p5-headunit/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
